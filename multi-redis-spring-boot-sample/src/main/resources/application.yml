spring:
  data:
    redis:
      auto-register: true
      clusters:
        # Standalone mode example
        order:    # 集群名 → 生成 orderRedisTemplate
          host: localhost
          port: 6379
          lettuce:
            pool:
              max-active: 16
              max-idle: 8
              min-idle: 2
        user:    # 集群名 → 生成 userRedisTemplate
          host: localhost
          port: 6380
          lettuce:
            pool:
              max-active: 8
              max-idle: 4
              min-idle: 1
        # Redis Cluster mode example
        cache:    # 集群名 → 生成 cacheRedisTemplate
          cluster:
            nodes:
              - localhost:7001
              - localhost:7002
              - localhost:7003
            max-redirects: 3
          timeout: 5000ms
          lettuce:
            pool:
              max-active: 16
              max-idle: 8
              min-idle: 2
              max-wait: 10000ms
            cluster:
              refresh:
                adaptive: true
                period: 2000ms
        session: # 集群名 → 生成 sessionRedisTemplate
          cluster:
            nodes:
              - localhost:7011
              - localhost:7012
              - localhost:7013
            max-redirects: 3
          timeout: 5000ms
          lettuce:
            pool:
              max-active: 16
              max-idle: 8
              min-idle: 2
              max-wait: 10000ms
            cluster:
              refresh:
                adaptive: true
                period: 2000ms
